<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <title>Reports — Capital Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/animations.css" />
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-logo">
      <div class="brand-icon">CF</div>
      <div>
        <div class="brand-name">Capital Flow</div>
        <div class="brand-sub" id="firm-name">Fanele &amp; Partners</div>
      </div>
    </div>
    <button class="btn-new-investment" onclick="openNewInvestment()">+ New Investment</button>
  </div>

  <nav class="sidebar-nav">
    <a href="index.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
      Portfolio
    </a>
    <a href="withdrawals.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      Withdrawals
    </a>
    <a href="compliance.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Compliance
    </a>
    <a href="reports.html" class="nav-item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Reports
    </a>
  </nav>

  <div class="sidebar-footer">
    <a href="profile.html" class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Settings
    </a>
    <button class="nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Support
    </button>
  </div>
</aside>

<header class="topbar">
  <div class="topbar-icon" title="Notifications">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  </div>
  <div class="topbar-divider"></div>
  <a href="profile.html" class="topbar-profile" title="View profile">
    <div class="topbar-avatar" id="avatar-initials">—</div>
    <div class="topbar-profile-info">
      <span class="topbar-profile-name" id="topbar-name">—</span>
      <span class="topbar-profile-role" id="topbar-role">Institutional Investor</span>
    </div>
  </a>
</header>

<main class="main">
  <div class="page-content">
    <div class="page-header">
      <h1>Reports &amp; Downloads</h1>
      <p>Centralised document hub for your investment portfolio.</p>
    </div>

    <div class="reports-topbar">
      <div class="filter-bar">
        <select class="filter-select" id="doc-type-filter" onchange="filterReports()">
          <option value="">All Document Types</option>
          <option value="STATEMENT">Statements</option>
          <option value="TAX_DOC">Tax Documents</option>
          <option value="ANALYSIS">Analysis</option>
        </select>
        <select class="filter-select" id="year-filter" onchange="filterReports()">
          <option value="">All Years</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="view-toggle">
          <button class="view-btn active" id="grid-view-btn" onclick="setView('grid')" title="Grid view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="list-view-btn" onclick="setView('list')" title="List view">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <button class="btn-download-all" onclick="downloadAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span id="download-all-label">Download All</span>
        </button>
      </div>
    </div>

    <div id="reports-container" class="reports-grid"></div>

    <div class="load-more">
      <button class="btn-load-more" onclick="loadMoreReports()">Load More Documents</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="../js/animations.js"></script>
<script src="../js/notifications.js"></script>
<script src="../js/common.js"></script>
<script src="../js/reports.js"></script>
</body>
</html>
