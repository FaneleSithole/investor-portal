server.port=8080
spring.application.name=capital-flow

# Serve frontend from project root (parent of backend/)
spring.web.resources.static-locations=file:../,classpath:/static/

# H2 in-memory database (assessment requirement)
spring.datasource.url=jdbc:h2:mem:capitalflow
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Run schema.sql before Hibernate DDL so existing DBs get nullable-safe column defaults
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
