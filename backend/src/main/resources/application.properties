server.port=8081
spring.application.name=capital-flow

# Serve frontend from project root (parent of backend/)
spring.web.resources.static-locations=file:../,classpath:/static/

# H2 database (file-backed for persistence across restarts)
# AUTO_SERVER=TRUE allows recovery when a previous process did not release the file lock
spring.datasource.url=jdbc:h2:mem:capitalflow
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Run schema.sql before Hibernate DDL so existing DBs get nullable-safe column defaults
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
